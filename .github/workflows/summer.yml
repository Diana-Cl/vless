name: Summer time

on:
  push:
    branches: [ "main" ]
    paths:
      - '**/summer.*'  # 'summer' in any directory and all types
      - 'sub/*.txt' 
  schedule:
    - cron: '0 */6 * * *'
  # Allow manual triggering of the workflow
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-configs:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  
        submodules: 'recursive' 
        token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

    # Install Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: pip
        architecture: x64
    
    # Cache Python dependencies
    - name: Cache Python packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('edge/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    # Install Python dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r edge/requirements.txt

    # Run summer to fetch cloudflare clean IP's
    - name: Lets go sweetheart
      run: python edge/summer.py

    # Commit and push if changes
    - name: Commit and push if changed
      run: |
        git config --local user.name "Diana-Cl"
        git config --local user.email "135276904+Diana-Cl@users.noreply.github.com"
        git add *.json
        git diff --quiet && git diff --staged --quiet || (
          git commit -m "Updated $(TZ='Asia/Tehran' date '+%H:%M:%S')" -m "The list of cloudflare IPs has been updated"
          git -c author.name="Diana-Cl" -c author.email="135276904+Diana-Cl@users.noreply.github.com" \
              -c committer.name="github-actions[bot]" -c committer.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit --amend --no-edit
        )
        git push
        
