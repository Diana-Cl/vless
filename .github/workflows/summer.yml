name: Summer time

on:
  push:
    branches: [ "main" ]
    paths:
      - 'edge/summer.py'
      - 'sub/*.txt'
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-configs:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  
        submodules: 'recursive' 
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: pip
        architecture: x64
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r edge/requirements.txt
    
    - name: Lets go sweetheart
      run: python edge/summer.py
    
    - name: Commit and push if changed
      run: |
        git config --local user.name "github-actions[bot]"
        git config --local user.email "135276904+Diana-Cl@users.noreply.github.com"
        git add sub/*.txt
        git diff --quiet && git diff --staged --quiet || (git commit -m "SYNCED $(TZ='Asia/Tehran' date '+%H:%M:%S')"
        commit_message: "Update configs"
        commit_description: "Applied automatic formatting using Black and Prettier"
        git_email: "github-actions[bot]@users.noreply.github.com"
        git_name: "github-actions[bot]"
        git push)
        
