name: Code Formatting and Style

on:
  push:
    paths:
      - '**/*.js'
      - '**/*.json' 
      - '**/*.html'
      - '**/*.css'
      - '**/*.yml'
      - '**/*.py'
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'
  PRETTIER_VERSION: '3.1.0'

jobs:
  formatting:
    name: Code Formatting
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Python tools
        run: |
          pip install black[d] flake8 isort

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Initialize npm project
        run: |
          if [ ! -f package.json ]; then
            npm init -y
          fi
          npm install prettier@${{ env.PRETTIER_VERSION }} prettier-plugin-toml --save-dev

      - name: Run Black formatter
        run: |
          black --check . || (black .; exit 0)
        continue-on-error: true

      - name: Run Prettier
        uses: creyD/prettier_action@v4.3
        with:
          prettier_options: --write **/*.{js,json,html,css,yml} --ignore-unknown
          commit_message: "style: apply code formatting"
          prettier_version: ${{ env.PRETTIER_VERSION }}
          only_changed: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit changes
        if: failure()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: auto-formatting" || echo "No changes to commit"
          git push
        continue-on-error: true

      - name: Post formatting status
        run: |
          echo "✅ Formatting completed successfully!"
          
