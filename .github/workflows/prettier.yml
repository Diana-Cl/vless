name: Code Formatting and Linting

on:
  push:
    paths:
      - '**/*.js'       # JavaScript files in any directory
      - '**/*.json'    # JSON ...
      - '**/*.html'   # HTML
      - '**/*.css'   # CSS 
      - '**/*.yml'  # YML
      - '**/*.md'  # MD
      - '**/*.py' # Python
    branches:
      - main
  # Trigger on pull requests to catch formatting issues before they reach main
  pull_request:
    branches: 
      - main
  # Allow manual triggering of the workflow
  workflow_dispatch:

# Environment variables used across jobs
env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'
  PRETTIER_VERSION: '3.4.2'
  ESLINT_VERSION: '8.56.0'

# Define the jobs to run
jobs:
  formatting:
    name: Code Formatting and Linting
    runs-on: ubuntu-22.04  # Using specific Ubuntu version for consistency
    timeout-minutes: 25    # Prevent workflow from hanging
    
    # Define required permissions
    permissions:
      contents: write       # Needed for making commits
      pull-requests: write  # Needed for PR comments
    
    strategy:
      fail-fast: false   # Continue with other tasks if one fails

    steps:
      # Check out the repository code
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0           # Fetch all history for better compatibility
          submodules: 'recursive'  # Include all submodules
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      # Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          architecture: x64

      # Cache Python dependencies
      - name: Cache Python packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Install Python formatting tools
      - name: Install Python formatting dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black[d] flake8 isort

      # Run Black formatter with error handling
      - name: Run Black formatter
        run: |
          echo "Running Black formatter check..."
          if ! black --check .; then
            echo "Formatting required. Applying changes..."
            black .
          fi
        continue-on-error: true

      # Set up Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Initialize npm if needed
      - name: Initialize npm if needed
        run: |
          if [ ! -f package.json ]; then
            npm init -y
          fi

      - name: Cache npm dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
           ${{ runner.os }}-npm-

      # Install Prettier and ESLint
      - name: Install Prettier and ESLint
        run: |
          npm install prettier@${{ env.PRETTIER_VERSION }} eslint@${{ env.ESLINT_VERSION }} eslint-config-prettier eslint-plugin-prettier prettier-plugin-toml

      - name: Run ESLint
        run: |
          echo "Running ESLint..."
          npx eslint . --fix --ext .js,.json,.html,.css,.yml,.md

      # Validate configuration files
      - name: Validate formatting configs
        run: |
          if [ -f .prettierrc ]; then
            prettier --check .prettierrc* || echo "Prettier config validation failed"
          fi
          if [ -f .eslintrc ]; then
            eslint --print-config .eslintrc* || echo "ESLint config validation failed"
          fi
          if [ -f pyproject.toml ]; then
            black --check pyproject.toml || echo "Black config validation failed"
          fi
          
      # Run Prettier formatter
      - name: Run Prettier
        run: |
          echo "Running Prettier..."
          prettier --write **/*.{js,json,html,css,yml,md} --ignore-unknown

      # Commit changes if any
      - name: Commit changes if any
        run: |
          git config --local user.name "Diana-Cl"
          git config --local user.email "135276904+Diana-Cl@users.noreply.github.com"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "style: apply code formatting and linting standards" -m "Applied automatic formatting using Prettier and ESLint"
        continue-on-error: true

      # Optional: Set up pre-commit hooks for local development
      - name: Setup pre-commit hooks
        run: |
          pip install pre-commit
          pre-commit install
        continue-on-error: true

      # Report formatting and linting status
      - name: Check formatting and linting status
        if: always()
        run: |
          echo "Formatting and Linting Status Report"
          echo "==================================="
          if [ ${{ job.status }} == 'success' ]; then
            echo "✅ All files are properly formatted and linted!"
          else
            echo "⚠️ Some files needed formatting or linting. Check the commits for changes."
          fi

      # Add PR comment with formatting and linting results
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const formatting_status = '${{ job.status }}' === 'success' 
              ? '✅ Code formatting and linting checks passed!'
              : '⚠️ Some files needed formatting or linting. Please check the commits for changes.';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: formatting_status
            });
