name: Format Code

on:
  push:
    paths:
      - '*.js'
      - '*.json'
      - '*.yml'
      - '*.html'
      - 'hiddify/*'
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  formatting:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.head_ref }}

      - name: Rename files without extension to .json
        run: |
          cd hiddify
          for file in *; do
            if [[ -f "$file" && "$file" != *.* ]]; then
              mv "$file" "$file.json"
            fi
          done

      - name: Prettier Action
        uses: creyD/prettier_action@v4.3
        with:
          prettier_options: --write **/*.{js,json,html,yml} --ignore-unknown
          commit_message: "Apply code formatting"
        continue-on-error: true
