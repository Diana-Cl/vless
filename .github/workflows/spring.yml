name: REvil WG

on:
  push:
    branches: [ "main" ]
    paths:
      - 'edge/spring.py'
#  schedule: #every fuckin 60 minutes
#    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.x"
    - name: Set up Python
      run: |
        python -m pip install --upgrade pip
        pip install ipaddress
   
    - name: run script
      run: python edge/spring.py
    - name: Commit changes with timestamp
      run: |          
          git config --global user.name "REvil"
          git config --global user.email "nirevil@proton.me"
          git config credential.helper store
          git add -A
          git diff --cached --quiet || git commit -m "ⅨⅣ $(TZ='Asia/Tehran' date '+%H:%M:%S')"
          git push
          
    - name: Push if changed
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        
