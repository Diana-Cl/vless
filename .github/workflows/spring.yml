name: Spring

on:
  push:
    branches: [ "main" ]
    paths:
      - '*.json'
      - 'edge/spring.py'
      - 'edge/assets/*.json'
  schedule: 
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 
        submodules: 'recursive' 

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: pip
        architecture: x64

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ipaddress

    - name: Lets go sweetheart
      run: python edge/spring.py

    - name: Commit and push if changed
      run: |
        commit_message: "apply code formatting standards"
          commit_description: "auto create sb"
          git_email: "github-actions[bot]@users.noreply.github.com"
          git_name: "github-actions[bot]"
          only_changed: true 
          skip_commit: false 
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        continue-on-error: true

        - name: Commit changes if any
         if: failure()
          run: |
            git config --local user.name "Diana-Cl"
            git config --local user.email "135276904+Diana-Cl@users.noreply.github.com"
            git add *.json
            git diff --quiet && git diff --staged --quiet || git commit -m "apply code formatting standards" -m "automatic create sb"
          continue-on-error: true
            git push
          
