name: Spring

on:
  push:
    branches: [ "main" ]
    paths:
      - 'edge/spring.py'
      - 'edge/assets/*.json'
  schedule: 
    - cron: '0 */3 * * *'
  # Allow manual triggering of the workflow
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Set up Python environment
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: pip
        architecture: x64

    # Cache Python dependencies
    - name: Cache Python packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('edge/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    # Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ipaddress

    # Run spring to fetch warp IP's and create 2 type of wg configurations
    - name: Run python
      run: python edge/spring.py

    - name: Commit and push if changed
      run: |
        git config --local user.name "DianaCl"
        git config --local user.email "135276904+Diana-Cl@users.noreply.github.com" 
        git add *.json
        if [ -n "$(git status -s)" ]; then
          git commit -m "All done! $(TZ='Asia/Tehran' date '+%H:%M:%S')" -m "WireGuard private keys and IPs have been renewed" -m "Co-authored-by: actions-user <github-actions[bot]@users.noreply.github.com>"
          git push
        fi
