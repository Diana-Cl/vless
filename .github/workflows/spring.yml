name: Spring

on:
  push:
    branches: [ "main" ]
    paths:
      - 'warp.json'
      - 'sing-box.json'
      - 'edge/spring.py'
      - 'edge/assets/singbox-template.json'
  schedule: # Runs every 4 fuckin hours
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: pip
        architecture: x64

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ipaddress

    - name: Lets go sweetheart
      run: python edge/spring.py

    - name: Commit and push if changed
      run: |
        git config --global user.name "REvil"
        git config --global user.email "nirevil@proton.me"
        git add *.json
        git diff --cached --quiet || git commit -m "ⅨⅣ $(TZ='Asia/Tehran' date '+%H:%M:%S')"
        git push
