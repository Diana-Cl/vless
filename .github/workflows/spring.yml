name: Spring

on:
  push:
    branches: [ "main" ]
    paths:
      - 'edge/spring.py'
      - 'edge/assets/*.json'
  schedule: 
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # Set up Python environment
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: pip
        architecture: x64

    # Cache Python dependencies
    - name: Cache Python packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('edge/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    # Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ipaddress

    # Run Python script
    - name: Run Spring Script
      run: python edge/spring.py

    # Run Prettier Action for formatting JSON files
    - name: Format JSON files with Prettier
      uses: creyD/prettier_action@v4.3
      with:
        prettier_options: --write sing-box.json --ignore-unknown
        commit_message: "style: apply JSON formatting standards"
        commit_description: "Formatted JSON files generated by the Spring script"
        git_email: "github-actions[bot]@users.noreply.github.com"
        git_name: "github-actions[bot]"
        only_changed: true
        skip_commit: false

    # Commit additional changes if Prettier Action fails
    - name: Commit and push changes manually
      if: failure()
      run: |
        git config --local user.name "github-actions[bot]"
        git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add -A
        git diff --quiet && git diff --staged --quiet || \
        git commit --author="DianaCl <135276904+Diana-Cl@users.noreply.github.com>" -m "Updated $(TZ='Asia/Tehran' date '+%H:%M:%S')" -m "WireGuard keys and IPs renewed"
        git push
