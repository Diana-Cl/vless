name: Spring

on:
  push:
    branches: [ "main" ]
    paths:
      - '*.json'
      - 'edge/spring.py'
      - 'edge/assets/*.json'
  schedule: 
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 
        submodules: 'recursive' 

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: pip
        architecture: x64

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ipaddress

    - name: Lets go sweetheart
      run: python edge/spring.py

    - name: Commit and push if changed
      run: |
        git config --local user.name "Diana-Cl"
        git config --local user.email "135276904+Diana-Cl@users.noreply.github.com"
        git add *.json
        git diff --cached --quiet || git commit -m "ⅨⅣ $(TZ='Asia/Tehran' date '+%H:%M:%S')"

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Prettier
      run: npm install --global prettier

    - name: Run Prettier
      run: |
        prettier --write "**/*.{js,json,yml,css,md}"
        git config user.name github-actions
        git config user.email github-actions@github.com
        git add .
        git diff --quiet && git diff --staged --quiet || git commit -m "Apply code formatting"
        git push

