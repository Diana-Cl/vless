name: Spring

on:
  push:
    branches: [ "main" ]
    paths:
      -  '.github/workflows/spring.yml'
      - 'edge/spring.py'
      - 'edge/assets/*.json'
  schedule: 
    - cron: '0 */3 * * *'
  # Allow manual triggering of the workflow
  workflow_dispatch:


jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0           
        submodules: 'recursive' 
        token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      
    # Set up Python environment
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: pip
        architecture: x64
        

    # Cache Python dependencies
    - name: Cache Python packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('edge/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          

    # Cache Python dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ipaddress

     # Run spring to fetch warp IP's and create 2 type of wg configurations
    - name: Run python
      run: python edge/spring.py

    - name: Commit and push if changed
      run: |
        git config --local user.name "actions-user"
        git config --local user.email "actions-user@example.com"
        git add *.json
        git diff --quiet && git diff --staged --quiet || (
          git commit -m "Task done $(TZ='Asia/Tehran' date '+%H:%M:%S')" -m "wireGuard private keys and IPs have been renewed"
          git -c author.name="Diana-Cl" -c author.email="135276904+Diana-Cl@users.noreply.github.com" \
              -c committer.name="actions-user" -c committer.email="actions-user@example.com" \
              commit --amend --no-edit)
          git push
