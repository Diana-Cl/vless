name: Spring

on:
  push:
    branches: [ "main" ]
    paths:
      - '*.json'
      - 'edge/assets/*.json'
  schedule: 
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 
        submodules: 'recursive' 

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: pip
        architecture: x64

    # Cache Python dependencies
    - name: Cache Python packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    # Install Python formatting tools
    - name: Install Python formatting dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black[d] flake8 isort

    # Run Black formatter with error handling
    - name: Run Black formatter
      run: |
        git config --local user.name "github-actions[bot]"
        git config --local user.email "135276904+Diana-Cl@users.noreply.github.com"
        git add A
        git diff --cached --quiet || git commit -m "Done"
        echo "Running Black formatter check..."
        if ! black --check .; then
          echo "Formatting required. Applying changes..."
          black .
        fi
      continue-on-error: true

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ipaddress

    - name: Lets go sweetheart
      run: python edge/spring.py

    - name: Commit and push if changed
      run: |
        git config --local user.name "Diana-Cl"
        git config --local user.email "135276904+Diana-Cl@users.noreply.github.com"
        git add *.json
        git diff --cached --quiet || git commit -m "ⅨⅣ $(TZ='Asia/Tehran' date '+%H:%M:%S')"
        git push
        


