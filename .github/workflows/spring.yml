name: Spring

on:
  push:
    branches: [ "main" ]
    paths:
      - '.github/workflows/spring.yml'
      - 'edge/spring.py'
      - 'edge/assets/*.json'
  schedule: 
    - cron: '0 */3 * * *'
  # Allow manual triggering of the workflow
  workflow_dispatch:


jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  
        submodules: 'recursive' 
        token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      
    # Set up Python environment
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: pip
        architecture: x64
        

    # Cache Python dependencies
    - name: Cache Python packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('edge/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          

    # Cache Python dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ipaddress

     # Run spring to fetch warp IP's and create 2 type of wg configurations
    - name: Run python
      run: python edge/spring.py

    - name: Commit and push if changed
      run: |
        git config --local user.name "Diana-Cl"
        git config --local user.email "135276904+Diana-Cl@users.noreply.github.com"
        git config --local author.name "Diana-Cl"
        git config --local author.email "135276904+Diana-Cl@users.noreply.github.com"
        git config --local committer.name "github-actions[bot]"
        git config --local committer.email "github-actions[bot]@users.noreply.github.com" 
        git add *.json
        git diff --quiet && git diff --staged --quiet || git commit -m "All done! $(TZ='Asia/Tehran' date '+%H:%M:%S')" -m "wireGuard private keys and IPs have been renewed"
        git push
