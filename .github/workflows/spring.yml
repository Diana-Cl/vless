name: Spring

on:
  push:
    branches: [ "main" ]
    paths:
      - '*.json'
      - 'edge/spring.py'
      - 'edge/assets/*.json'
  schedule: 
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ipaddress

    - name: Lets go sweetheart
      run: python edge/spring.py

    - name: Commit and push if changed
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "Diana-Cl+github-actions[bot]@users.noreply.github.com"
        git add *.json
        git diff --quiet && git diff --staged --quiet || git commit -m "warp private keys updated: at:"
        git push
