name: Format & Lint Code

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format-lint:
    name: Format & Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install formatters & linters
        run: |
          npm install -g prettier eslint stylelint
          pip install black flake8 yamllint

      - name: Run Prettier (JavaScript, JSON, Markdown)
        run: prettier --write "**/*.{js,json,md}"

      - name: Run Black (Python)
        run: black .

      - name: Run ESLint (JavaScript)
        run: eslint . --fix

      - name: Run Flake8 (Python)
        run: flake8 .

      - name: Run Stylelint (CSS, SCSS)
        run: stylelint "**/*.{css,scss}" --fix

      - name: Run yamllint (YAML)
        run: yamllint -c .yamllint.yml .

      - name: Check for changes
        id: git-diff
        run: git diff --exit-code || echo "::set-output name=changes::true"

      - name: Commit & Push Changes (if any)
        if: steps.git-diff.outputs.changes == 'true'
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "🔧 Auto-format & lint code"
          git push
          
