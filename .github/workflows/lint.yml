name: Format & Lint Code

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  formatting:
    name: Code Formatting
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    # Define required permissions
    permissions:
      contents: write
      pull-requests: write

    strategy:
      fail-fast: false

    steps:
      # Check out the repository code
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: 'recursive' # Include all submodules
          token: ${{ secrets.GITHUB_TOKEN }}

      # Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          architecture: x64

      # Cache Python dependencies
      - name: Cache Python packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install formatters & linters
        run: |
          npm install -g prettier eslint stylelint

      - name: Install formatters 2
          python -m pip install --upgrade pip
          pip install black flake8 yamllint

      - name: Run Prettier (JavaScript, JSON, Markdown)
        run: prettier --write "**/*.{js,json,md}"

      - name: Run Black (Python)
        run: black .

      - name: Run ESLint (JavaScript)
        run: eslint . --fix || true

      - name: Run Flake8 (Python)
        run: flake8 . || true

      - name: Run Stylelint (CSS, SCSS)
        run: stylelint "**/*.{css,scss}" --fix || true

      - name: Run yamllint (YAML)
        run: yamllint -c .yamllint.yml .

      - name: Check for changes
        run: git diff --exit-code || echo "Changes detected"

      - name: Commit & Push Changes (if any)
        if: success() || failure()
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "🔧 Auto-format & lint code" || echo "No changes to commit"
          git push
