name: Format & Lint Code

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write  # Add permissions for pushing changes

jobs:
  format-lint:
    name: Format & Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for git operations

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install formatters & linters
        run: |
          npm install -g prettier eslint stylelint
          pip install black flake8 yamllint

      - name: Run Prettier
        run: prettier --write "**/*.{js,json,md}"

      - name: Run Black
        run: black .

      - name: Run ESLint
        run: eslint . --fix || true

      - name: Run Flake8
        run: flake8 . || true

      - name: Run Stylelint
        run: stylelint "**/*.{css,scss}" --fix || true

      - name: Run yamllint
        run: yamllint -c .yamllint.yml .

      - name: Commit & Push Changes
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "🔧 Auto-format & lint code"
            git push
          fi
