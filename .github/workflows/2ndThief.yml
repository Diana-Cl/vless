name: Build WG Configs

on:
  schedule:
    - cron: '0 * * * *' # اجرا هر ساعت یک بار
  workflow_dispatch: # امکان اجرای دستی

permissions:
  contents: write

jobs:
  update-configs:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r edge/requirements.txt

    - name: Run script
      run: python edge/2ndThief.py

    - name: Commit and push if changed
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add wireguardnekobox # نام فایل صحیح در اینجا تنظیم شده است
        git diff --quiet && git diff --staged --quiet || (git commit -m "SYNCED at $(date)" && git push)
