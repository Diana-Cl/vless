name: Code Quality

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        npm install
        pip install flake8

    - name: Run ESLint
      run: npx eslint '**/*.js'

    - name: Run Prettier
      run: npx prettier --check '**/*.{js,json}'

    - name: Run flake8
      run: flake8 .
