name: Code Quality Assurance

on:
  push:
    paths:
      - '**/*.{js,py,md,css,yml,json,html}'
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'
  PRETTIER_VERSION: '3.4.2'
  BLACK_VERSION: '24.4.2'

jobs:
  code-quality:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Python Tools
        run: |
          python -m pip install --upgrade pip
          pip install black==${{ env.BLACK_VERSION }} flake8 isort

      - name: Run Black Formatter
        run: |
          black --check . && echo "No formatting needed" || (black . && exit 1)

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Prettier
        run: npm install --global prettier@${{ env.PRETTIER_VERSION }} prettier-plugin-toml

      - name: Run Prettier
        run: |
          prettier --check --write '**/*.{js,json,html,css,yml,md}' --ignore-unknown || \
          (echo "Prettier formatting applied"; exit 1)

      - name: Commit Formatting Changes
        if: always()
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || \
          git commit -m "style: apply automated formatting"
          git push

      - name: Lint Codebase
        run: |
          flake8 . --count --max-complexity=10 --statistics
          [ -f package.json ] && npx eslint . || echo "No ESLint config"

      - name: Quality Report
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const report = {
              title: 'Code Quality Report',
              summary: `Run completed: ${new Date().toISOString()}`,
              details: [
                `• Python formatted with Black ${process.env.BLACK_VERSION}`,
                `• JavaScript/HTML/CSS formatted with Prettier ${process.env.PRETTIER_VERSION}`,
                '• Linting performed with Flake8 & ESLint'
              ].join('\n')
            };
            
            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: '${{ job.status }}',
              description: 'Code quality checks completed',
              context: 'code-quality'
            });
            
            if (context.payload.pull_request) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `### Code Quality Report\n${report.details}`
              });
            }
            
