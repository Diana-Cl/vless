name: Code Quality Assurance

on:
  push:
    paths:
      - '**/*.{js,py,md,css,yml,json,html}'
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'
  PRETTIER_VERSION: '3.4.2'
  BLACK_VERSION: '24.4.2'

jobs:
  code-quality:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      statuses: write
      pull-requests: write
      checks: write

    steps:
      # ... other steps remain the same ...

      - name: Quality Report
        if: always()
        uses: actions/github-script@v7
        env:
          BLACK_VER: ${{ env.BLACK_VERSION }}
          PRETTIER_VER: ${{ env.PRETTIER_VERSION }}
        with:
          script: |
            const { BLACK_VER, PRETTIER_VER } = process.env;
            const reportDetails = [
              `• Python formatted with Black ${BLACK_VER}`,
              `• JavaScript/HTML/CSS formatted with Prettier ${PRETTIER_VER}`,
              '• Linting performed with Flake8 & ESLint'
            ].join('\n');

            try {
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha: context.sha,
                state: '${{ job.status }}',
                description: 'Code quality checks completed',
                context: 'code-quality'
              });
            } catch (error) {
              core.warning(`Failed to create commit status: ${error.message}`);
            }

            if (context.payload.pull_request) {
              try {
                await github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: `### Code Quality Report\n${reportDetails}`
                });
              } catch (error) {
                core.warning(`Failed to create PR comment: ${error.message}`);
              }
            }
            
